name: Build & Deploy

# Triggers:
#   - Push to main  → build + deploy to staging → smoke test → swap to production
#   - Pull request  → build only (validates the code, no deployment)
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# ---------------------------------------------------------------------------
# GitHub repository settings you need to configure before this runs:
#
# Secrets (Settings → Secrets and variables → Actions → Secrets):
#   AZURE_CREDENTIALS   — service principal JSON. Create with:
#     az ad sp create-for-rbac \
#       --name "gh-thibaut-querybuilder" \
#       --role contributor \
#       --scopes /subscriptions/<sub-id>/resourceGroups/<rg-name> \
#       --json-auth
#     Paste the entire JSON output as the secret value.
#
# Variables (Settings → Secrets and variables → Actions → Variables):
#   APP_NAME        — your App Service name, e.g. thibaut-querybuilder
#   RESOURCE_GROUP  — your resource group, e.g. rg-thibaut-querybuilder
# ---------------------------------------------------------------------------

jobs:
  # -------------------------------------------------------------------------
  # Job 1: Build
  # Runs on every push and PR. Builds the React frontend and validates the
  # Python backend can be imported without errors.
  # -------------------------------------------------------------------------
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # --- Frontend -----------------------------------------------------------
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Build frontend
        run: npm run build
        working-directory: frontend

      # --- Backend (syntax check) -------------------------------------------
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        run: pip install -r requirements.txt
        working-directory: backend

      - name: Check Python syntax
        run: python -c "import app.main; print('Backend import OK')"
        working-directory: backend

      # --- Package for deployment -------------------------------------------
      - name: Create deployment zip
        run: |
          zip -r deploy.zip \
            backend \
            frontend/dist \
            startup.sh \
            -x "backend/.venv/*" \
            -x "backend/.env" \
            -x "backend/report_templates.json" \
            -x "backend/__pycache__/*" \
            -x "backend/app/__pycache__/*" \
            -x "*.pyc"

      - name: Upload deployment artifact
        uses: actions/upload-artifact@v4
        with:
          name: deploy-zip
          path: deploy.zip
          retention-days: 1

  # -------------------------------------------------------------------------
  # Job 2: Deploy
  # Only runs on push to main (not on PRs). Deploys to the staging slot,
  # smoke-tests it, then swaps staging → production.
  # -------------------------------------------------------------------------
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    environment:
      name: production
      url: https://${{ vars.APP_NAME }}.azurewebsites.net

    steps:
      - name: Download deployment artifact
        uses: actions/download-artifact@v4
        with:
          name: deploy-zip

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      # Look up the staging slot's actual hostname (Azure generates a unique
      # suffix like thibautquerybuilder-staging-abc123.centralus-01.azurewebsites.net)
      - name: Get staging hostname
        id: staging
        run: |
          HOST=$(az webapp show \
            --name "${{ vars.APP_NAME }}" \
            --resource-group "${{ vars.RESOURCE_GROUP }}" \
            --slot staging \
            --query "defaultHostName" -o tsv)
          echo "host=$HOST" >> $GITHUB_OUTPUT
          echo "Staging host: $HOST"

      # Deploy to the staging slot (not production yet)
      - name: Deploy to staging slot
        run: |
          az webapp deploy \
            --name "${{ vars.APP_NAME }}" \
            --resource-group "${{ vars.RESOURCE_GROUP }}" \
            --slot staging \
            --type zip \
            --src-path deploy.zip \
            --async false

      # Poll the staging health endpoint until the app is up (or 10 min timeout).
      # The first deploy installs the ODBC driver + pip packages, which takes
      # several minutes. Subsequent deploys are faster but still need ~30s.
      - name: Wait for staging to be healthy
        run: |
          URL="https://${{ steps.staging.outputs.host }}/api/health"
          echo "Waiting for staging to be healthy: $URL"
          for i in $(seq 1 40); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 "$URL" || echo "000")
            echo "Attempt $i/40: HTTP $STATUS"
            if [ "$STATUS" = "200" ]; then
              echo "Staging is healthy."
              exit 0
            fi
            sleep 15
          done
          echo "ERROR: Staging did not become healthy within 10 minutes."
          exit 1

      # Swap staging into production (zero-downtime)
      - name: Swap staging → production
        run: |
          az webapp deployment slot swap \
            --name "${{ vars.APP_NAME }}" \
            --resource-group "${{ vars.RESOURCE_GROUP }}" \
            --slot staging \
            --target-slot production

      - name: Deployment complete
        run: |
          echo "Deployed to https://${{ vars.APP_NAME }}.azurewebsites.net"
